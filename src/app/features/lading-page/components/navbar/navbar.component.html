<nav class="navbar sticky top-0 z-50 border-b border-red-200 bg-red-50/90 backdrop-blur-xl">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
    <!-- LOGO -->
    <div class="flex items-center gap-3">
      <img class="h-auto w-32 md:w-36" src="/Logo_transparent.png" />
    </div>

    <!-- DESKTOP MENU -->
    <div
      class="hidden items-center gap-2 rounded-full bg-white/70 p-1 text-sm font-medium text-gray-600 shadow-sm md:flex"
    >
      <button
        type="button"
        (click)="goToSection('about')"
        class="rounded-full px-4 py-2 transition hover:bg-red-100 hover:text-red-600"
      >
        {{ 'navbar.about' | translate }}
      </button>

      <button
        type="button"
        (click)="goToSection('features')"
        class="rounded-full px-4 py-2 transition hover:bg-red-100 hover:text-red-600"
      >
        {{ 'navbar.features' | translate }}
      </button>
      <app-language-switcher></app-language-switcher>

      <button
        type="button"
        (click)="goToAuth()"
        class="rounded-full bg-red-600 px-5 py-2 font-semibold text-white shadow-md shadow-red-500/25 transition hover:bg-red-700"
      >
        {{ 'navbar.get_started' | translate }}
      </button>
    </div>

    <!-- MOBILE BUTTON -->
    <button
      type="button"
      (click)="mobileMenuOpen = !mobileMenuOpen"
      class="flex h-10 w-10 items-center justify-center rounded-xl bg-white text-red-600 shadow-sm md:hidden"
    >
      <i class="fa-solid" [ngClass]="mobileMenuOpen ? 'fa-xmark' : 'fa-bars'"></i>
    </button>
  </div>

  <!-- MOBILE MENU -->
  <div
    *ngIf="mobileMenuOpen"
    class="border-t border-red-100 bg-red-50/95 px-6 pb-5 pt-2 shadow-lg md:hidden"
  >
    <div class="flex flex-col gap-2 text-sm font-medium text-gray-700">
      <button
        type="button"
        (click)="goToSection('about'); mobileMenuOpen = false"
        class="rounded-xl px-4 py-3 text-left transition hover:bg-red-100 hover:text-red-600"
      >
        About
      </button>

      <button
        type="button"
        (click)="goToSection('features'); mobileMenuOpen = false"
        class="rounded-xl px-4 py-3 text-left transition hover:bg-red-100 hover:text-red-600"
      >
        Features
      </button>
      <app-language-switcher></app-language-switcher>

      <button
        type="button"
        (click)="goToAuth(); mobileMenuOpen = false"
        class="mt-2 rounded-xl bg-red-600 px-4 py-3 font-semibold text-white shadow-md shadow-red-500/25 transition hover:bg-red-700"
      >
        Get Started
      </button>
    </div>
  </div>
</nav>
