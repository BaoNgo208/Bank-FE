<!-- SECTION 3 - LOW FEES -->
<section class="min-h-screen flex items-center justify-center bg-white px-4 py-20 overflow-hidden">
  <div class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
    <!-- LEFT CONTENT -->
    <div class="space-y-6 text-center lg:text-left">
      <div
        class="reveal reveal-up delay-1 inline-flex items-center gap-2 rounded-full bg-red-50 px-4 py-2 shadow-sm border border-red-100"
      >
        <span class="h-2 w-2 rounded-full bg-red-600"></span>
        <span class="text-sm font-medium text-red-700">Transparent pricing</span>
      </div>

      <h2
        class="reveal reveal-rotate delay-1 text-4xl md:text-5xl lg:text-6xl font-bold text-gray-950 leading-tight"
      >
        Low Fees,
        <span class="block text-red-600">More Savings</span>
      </h2>

      <p
        class="reveal reveal-up delay-2 text-gray-600 text-base md:text-lg max-w-xl mx-auto lg:mx-0"
      >
        Save more on every transaction with simple, transparent fees designed to keep your money
        moving smarter.
      </p>

      <!-- STATS -->
      <div class="reveal reveal-up delay-3 grid grid-cols-2 gap-4 max-w-md mx-auto lg:mx-0">
        <div class="rounded-2xl bg-white p-5 shadow-sm border border-red-100">
          <p class="text-3xl font-bold text-gray-950">0%</p>
          <p class="mt-1 text-sm text-gray-500">Transaction fee</p>
        </div>

        <div class="rounded-2xl bg-white p-5 shadow-sm border border-red-100">
          <p class="text-3xl font-bold text-gray-950">24/7</p>
          <p class="mt-1 text-sm text-gray-500">Fast transfer</p>
        </div>
      </div>

      <!-- CTA -->
      <div
        class="reveal reveal-up delay-4 flex flex-col sm:flex-row gap-3 justify-center lg:justify-start"
      >
        <button
          (click)="navigateService.navigateToUserAuth()"
          type="button"
          class="rounded-full bg-red-600 px-6 py-3 text-sm font-semibold text-white shadow-lg shadow-red-600/25 hover:bg-red-700 transition"
        >
          Start Saving Now
        </button>
      </div>
    </div>

    <!-- RIGHT CARD / IMAGE -->
    <div class="reveal reveal-up delay-2 relative">
      <div class="absolute -top-8 -right-8 h-32 w-32 rounded-full bg-red-300/30 blur-3xl"></div>
      <div class="absolute -bottom-8 -left-8 h-40 w-40 rounded-full bg-red-200/40 blur-3xl"></div>

      <div
        class="relative rounded-[2rem] bg-white p-4 md:p-6 shadow-2xl shadow-red-100 border border-red-100"
      >
        <div class="overflow-hidden rounded-[1.5rem] relative">
          <img
            [src]="imageUrl"
            alt="Low transaction fee savings"
            class="h-[320px] md:h-[420px] w-full object-cover"
          />

          <div
            class="absolute inset-0 bg-gradient-to-tr from-red-900/35 via-red-500/10 to-transparent"
          ></div>
        </div>

        <!-- FLOATING SAVING CARD -->
        <div
          class="absolute -bottom-6 left-1/2 w-[85%] -translate-x-1/2 rounded-2xl bg-white/95 backdrop-blur-xl border border-red-100 shadow-xl p-4"
        >
          <div class="flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
              <div
                class="h-11 w-11 rounded-full bg-red-50 flex items-center justify-center text-red-600"
              >
                <i class="fa-solid fa-piggy-bank"></i>
              </div>

              <div>
                <p class="text-sm font-semibold text-gray-950">Fee saved</p>
                <p class="text-xs text-gray-500">This month</p>
              </div>
            </div>

            <div class="text-right">
              <p class="text-xl font-bold text-red-600">$128.40</p>
              <p class="text-xs text-gray-400">+18% better</p>
            </div>
          </div>

          <div class="mt-4 h-2 rounded-full bg-red-50 overflow-hidden">
            <div class="h-full w-[78%] rounded-full bg-red-600"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
