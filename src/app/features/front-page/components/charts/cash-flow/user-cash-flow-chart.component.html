<div class="xl:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
  <!-- Header -->
  <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
    <div>
      <h2 class="font-semibold text-[1.15rem] text-gray-800">Deposit vs Withdraw</h2>
      <p class="text-xs text-gray-400 mt-1">Cash flow overview by selected period</p>
    </div>

    <!-- Filter -->
    <div class="flex items-center bg-gray-100 rounded-xl p-1 text-xs font-medium">
      <button
        type="button"
        (click)="changeRange(DashboardPeriod.WEEK)"
        class="px-4 py-2 rounded-lg transition"
        [ngClass]="
          selectedRange() === DashboardPeriod.WEEK
            ? 'bg-white text-blue-600 shadow-sm'
            : 'text-gray-500 hover:text-gray-800'
        "
      >
        Week
      </button>

      <button
        type="button"
        (click)="changeRange(DashboardPeriod.MONTH)"
        class="px-4 py-2 rounded-lg transition"
        [ngClass]="
          selectedRange() === DashboardPeriod.MONTH
            ? 'bg-white text-blue-600 shadow-sm'
            : 'text-gray-500 hover:text-gray-800'
        "
      >
        Month
      </button>

      <button
        type="button"
        (click)="changeRange(DashboardPeriod.YEAR)"
        class="px-4 py-2 rounded-lg transition"
        [ngClass]="
          selectedRange() === DashboardPeriod.YEAR
            ? 'bg-white text-blue-600 shadow-sm'
            : 'text-gray-500 hover:text-gray-800'
        "
      >
        Year
      </button>
    </div>
  </div>

  <!-- Legend -->
  <div class="flex items-center justify-between px-5 pt-4 text-xs text-gray-500">
    <div class="flex items-center gap-5">
      <div class="flex items-center gap-2">
        <span class="w-3 h-3 rounded-full bg-amber-500"></span>
        <span>Deposit</span>
      </div>

      <div class="flex items-center gap-2">
        <span class="w-3 h-3 rounded-full bg-red-500"></span>
        <span>Withdraw</span>
      </div>
    </div>

    <span *ngIf="loading()" class="text-gray-400">Loading...</span>
  </div>

  <!-- Chart body -->
  <div class="h-[300px] px-4 pb-5 pt-3">
    <canvas #chartCanvas class="w-full h-full"></canvas>
  </div>
</div>
