<div class="rounded-xl bg-white p-5 shadow-sm border border-gray-200">
  <!-- HEADER -->
  <div class="flex items-center justify-between mb-5">
    <div>
      <h3 class="text-base font-semibold text-gray-900">Asset Allocation</h3>
      <p class="text-xs text-gray-500 mt-1">Overview of your wallet balance</p>
    </div>

    <button
      type="button"
      class="h-9 w-9 rounded-lg bg-red-50 text-red-600 hover:bg-red-100 transition disabled:opacity-50 disabled:cursor-not-allowed"
      [disabled]="loadingAssetAllocation()"
      (click)="loadAssetAllocation()"
    >
      <i
        class="fa-solid text-sm"
        [ngClass]="loadingAssetAllocation() ? 'fa-spinner fa-spin' : 'fa-rotate-right'"
      ></i>
    </button>
  </div>

  <!-- LOADING FIRST TIME ONLY -->
  <div
    *ngIf="loadingAssetAllocation() && !assetAllocation()"
    class="h-[260px] flex items-center justify-center"
  >
    <div class="flex flex-col items-center gap-3 text-gray-400">
      <i class="fa-solid fa-spinner fa-spin text-xl"></i>
      <span class="text-sm">Loading asset allocation...</span>
    </div>
  </div>

  <!-- EMPTY -->
  <div
    *ngIf="!loadingAssetAllocation() && !assetAllocation()"
    class="h-[260px] flex items-center justify-center"
  >
    <div class="text-center text-gray-400">
      <i class="fa-regular fa-chart-pie text-3xl mb-3"></i>
      <p class="text-sm">No allocation data available</p>
    </div>
  </div>

  <!-- CONTENT -->
  <div *ngIf="assetAllocation()" class="relative grid grid-cols-1 xl:grid-cols-2 gap-5">
    <!-- REFRESH LOADING OVERLAY -->
    <div
      *ngIf="loadingAssetAllocation()"
      class="absolute inset-0 z-10 flex items-center justify-center rounded-xl bg-white/50 backdrop-blur-[1px]"
    >
      <div
        class="h-8 w-8 rounded-full bg-white shadow flex items-center justify-center text-red-500"
      >
        <i class="fa-solid fa-spinner fa-spin text-sm"></i>
      </div>
    </div>

    <!-- CHART -->
    <div class="flex items-center justify-center">
      <div class="relative h-[260px] w-[260px]">
        <canvas #assetAllocationChart class="block h-full w-full"></canvas>

        <div
          class="absolute inset-0 flex flex-col items-center justify-center text-center pointer-events-none"
        >
          <p class="text-xs text-gray-500">Total</p>
          <p class="text-xl font-bold text-gray-900">
            {{ assetAllocation()?.total_amount | number: '1.2-4' }}
          </p>
          <p class="text-xs text-gray-400">USD</p>
        </div>
      </div>
    </div>

    <!-- LEGEND -->
    <div class="flex flex-col justify-center space-y-3">
      <div
        *ngFor="let item of assetAllocation()?.items; let i = index"
        class="flex items-center justify-between rounded-xl border border-gray-100 px-4 py-3"
      >
        <div class="flex items-center gap-3">
          <span
            class="h-3 w-3 rounded-full"
            [ngStyle]="{ 'background-color': chartColors[i] }"
          ></span>

          <div>
            <p class="text-sm font-medium text-gray-800">
              {{ formatAllocationKey(item.key) }}
            </p>
            <p class="text-xs text-gray-400">{{ item.percent | number: '1.0-2' }}%</p>
          </div>
        </div>

        <p class="text-sm font-semibold text-gray-900">
          {{ item.amount | number: '1.2-4' }}
        </p>
      </div>
    </div>
  </div>
</div>
