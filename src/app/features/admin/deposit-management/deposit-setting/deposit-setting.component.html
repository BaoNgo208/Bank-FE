<div class="p-0 w-full text-[#0f172a]">
  <!-- HEADER -->
  <div class="mb-6">
    <h2 class="text-xl font-semibold">Deposit Settings</h2>
    <p class="text-sm text-gray-400">Configure deposit rules</p>
  </div>

  <!-- CARD -->
  <div class="bg-[#1e293b] rounded-2xl border border-white/10 shadow-xl p-6">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
      <!-- Currency -->
      <div>
        <label class="text-xs text-gray-400 mb-1 block">Currency</label>
        <select
          formControlName="currency"
          class="w-full bg-[#0f172a] text-gray-400 border border-white/10 rounded-lg px-3 py-2"
        >
          <option value="USDT">USDT</option>
          <option value="USDC">USDC</option>
        </select>
      </div>

      <!-- Fee -->
      <div>
        <label class="text-xs text-gray-400 mb-1 block">Fee (%)</label>
        <input
          type="number"
          formControlName="fee_percent"
          placeholder="0 - 100"
          class="w-full bg-[#0f172a] text-gray-400 border border-white/10 rounded-lg px-3 py-2"
        />
      </div>

      <!-- Min / Max -->
      <div class="grid grid-cols-2 gap-4">
        <!-- Min -->
        <div>
          <label class="text-xs text-gray-400 mb-1 block">Min Amount</label>
          <input
            type="number"
            formControlName="min_amount"
            class="w-full bg-[#0f172a] text-gray-400 border border-white/10 rounded-lg px-3 py-2"
          />
        </div>

        <!-- Max -->
        <div>
          <label class="text-xs text-gray-400 mb-1 block">Max Amount</label>
          <input
            type="number"
            formControlName="max_amount"
            class="w-full bg-[#0f172a] text-gray-400 border border-white/10 rounded-lg px-3 py-2"
          />
        </div>
      </div>

      <!-- ERROR -->
      <div *ngIf="form.errors?.['maxInvalid']" class="text-red-400 text-xs">
        Max amount must be greater than or equal to Min amount
      </div>

      <!-- ACTION -->
      <div class="flex justify-end pt-4 border-t border-white/10">
        <button
          type="submit"
          [disabled]="form.invalid"
          class="px-5 py-2 rounded-lg bg-purple-500 hover:bg-purple-600 disabled:opacity-50 text-white"
        >
          Save Settings
        </button>
      </div>
    </form>
  </div>
</div>
