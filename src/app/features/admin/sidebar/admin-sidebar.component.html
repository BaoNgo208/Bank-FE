<aside class="w-[260px] h-full bg-[#0f172a] text-white flex flex-col">
  <!-- Logo -->
  <div class="h-[70px] flex items-center px-6 border-b border-white/10">
    <span class="text-lg font-semibold">⚡ Admin</span>
  </div>

  <!-- Menu -->
  <nav class="flex-1 px-3 py-4 space-y-2 text-sm">
    <a
      *ngFor="let item of menu"
      [routerLink]="item.path"
      routerLinkActive="bg-white/20"
      class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-white/10 transition"
    >
      <i class="fa" [ngClass]="item.icon"></i>
      {{ item.label }}
    </a>
  </nav>

  <!-- User -->
  <div class="p-4 border-t border-white/10 flex items-center gap-3">
    <div class="w-8 h-8 bg-gray-400 rounded-full"></div>
    <div>
      <div class="text-sm">Admin</div>
      <div class="text-xs text-gray-400">Administrator</div>
    </div>
  </div>
</aside>
