<div class="space-y-6">
  <!-- ===== STATS ===== -->
  <div class="grid grid-cols-4 gap-4">
    <div
      *ngFor="let item of stats"
      class="bg-white rounded-xl p-4 shadow-sm flex items-center gap-4"
    >
      <div class="w-10 h-10 flex items-center justify-center rounded-lg" [ngClass]="item.color">
        <i class="fa" [ngClass]="item.icon"></i>
      </div>

      <div>
        <div class="text-sm text-gray-500">{{ item.label }}</div>
        <div class="text-xl font-semibold">{{ item.value }}</div>
        <div *ngIf="item.sub" class="text-xs text-gray-400">{{ item.sub }}</div>
      </div>
    </div>
  </div>

  <!-- ===== MAIN GRID ===== -->
  <div class="grid grid-cols-3 gap-6">
    <!-- Chart fake -->
    <div class="col-span-2 bg-white p-4 rounded-xl shadow-sm">
      <div class="flex justify-between mb-4">
        <h2 class="font-semibold text-[1.25rem]">Deposit vs Withdraw</h2>
      </div>
      <div class="flex items-center gap-3 text-xs">
        <!-- quick filter -->
        <span (click)="changeRange('week')" class="cursor-pointer">Week</span>
        <span (click)="changeRange('month')" class="cursor-pointer">Month</span>
        <span (click)="changeRange('year')" class="cursor-pointer">Year</span>

        <!-- divider -->
        <span class="text-gray-300">|</span>

        <!-- custom date -->
        <input type="date" [(ngModel)]="startDate" class="border px-2 py-1 rounded" />

        <input type="date" [(ngModel)]="endDate" class="border px-2 py-1 rounded" />

        <button (click)="applyCustomRange()" class="bg-blue-500 text-white px-3 py-1 rounded">
          Apply
        </button>
      </div>
      <!-- fake chart -->
      <div class="h-[260px]">
        <canvas #chartCanvas class="w-full h-full"></canvas>
      </div>
    </div>

    <!-- Activity -->
    <div class="bg-white p-4 rounded-xl shadow-sm">
      <h2 class="font-semibold mb-4">Recent Activity</h2>

      <div class="space-y-3 text-sm">
        <div *ngFor="let i of [1, 2, 3]">
          <div class="font-medium">Withdrawal completed</div>
          <div class="text-gray-400 text-xs">$500 USDT</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== TABLE ===== -->
  <div class="bg-white p-4 rounded-xl shadow-sm">
    <div class="flex justify-between mb-4">
      <h2 class="font-semibold">Recent Withdrawals</h2>
      <input placeholder="Search..." class="border px-3 py-1 rounded text-sm" />
    </div>

    <table class="w-full text-sm">
      <thead class="text-gray-500 border-b">
        <tr>
          <th class="text-left py-2">Order</th>
          <th>User</th>
          <th>Amount</th>
          <th>Network</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let item of recentWithdrawals" class="border-b text-center">
          <td class="py-2 text-left">{{ item.id }}</td>
          <td>{{ item.user }}</td>
          <td>{{ item.amount }}</td>
          <td>
            <span class="px-2 py-1 bg-blue-100 text-blue-600 rounded text-xs">
              {{ item.network }}
            </span>
          </td>
          <td>
            <span
              class="px-2 py-1 rounded text-xs"
              [ngClass]="{
                'bg-yellow-100 text-yellow-600': item.status === 'Pending',
                'bg-green-100 text-green-600': item.status === 'Completed',
                'bg-red-100 text-red-600': item.status === 'Rejected',
              }"
            >
              {{ item.status }}
            </span>
          </td>
          <td>{{ item.date }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
