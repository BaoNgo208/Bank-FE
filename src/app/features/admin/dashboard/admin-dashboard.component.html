<div class="space-y-6">
  <!-- ===== STATS ===== -->
  <div class="grid grid-cols-4 gap-4">
    <div
      *ngFor="let item of stats()"
      class="bg-white rounded-xl p-4 shadow-sm flex items-center gap-4"
    >
      <div class="w-10 h-10 flex items-center justify-center rounded-lg" [ngClass]="item.color">
        <i class="fa" [ngClass]="item.icon"></i>
      </div>

      <div>
        <div class="text-sm text-gray-500">{{ item.label }}</div>
        <div class="text-xl font-semibold">{{ item.value }}</div>
        <div *ngIf="item.sub" class="text-xs text-gray-400">{{ item.sub }}</div>
      </div>
    </div>
  </div>
  <!-- ===== MAIN GRID ===== -->
  <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
    <!-- Chart -->
    <div
      class="xl:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden"
    >
      <!-- Header -->
      <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
        <div>
          <h2 class="font-semibold text-[1.15rem] text-gray-800">Deposit vs Withdraw</h2>
          <p class="text-xs text-gray-400 mt-1">Cash flow overview by selected period</p>
        </div>

        <!-- Filter -->
        <div class="flex items-center bg-gray-100 rounded-xl p-1 text-xs font-medium">
          <button
            type="button"
            (click)="changeRange('week')"
            class="px-4 py-2 rounded-lg transition"
            [ngClass]="
              selectedRange === 'week'
                ? 'bg-white text-blue-600 shadow-sm'
                : 'text-gray-500 hover:text-gray-800'
            "
          >
            Week
          </button>

          <button
            type="button"
            (click)="changeRange('month')"
            class="px-4 py-2 rounded-lg transition"
            [ngClass]="
              selectedRange === 'month'
                ? 'bg-white text-blue-600 shadow-sm'
                : 'text-gray-500 hover:text-gray-800'
            "
          >
            Month
          </button>

          <button
            type="button"
            (click)="changeRange('year')"
            class="px-4 py-2 rounded-lg transition"
            [ngClass]="
              selectedRange === 'year'
                ? 'bg-white text-blue-600 shadow-sm'
                : 'text-gray-500 hover:text-gray-800'
            "
          >
            Year
          </button>
        </div>
      </div>

      <!-- Legend -->
      <div class="flex items-center gap-5 px-5 pt-4 text-xs text-gray-500">
        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-green-500"></span>
          <span>Deposit</span>
        </div>

        <div class="flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-red-500"></span>
          <span>Withdraw</span>
        </div>
      </div>

      <!-- Chart body -->
      <div class="h-[300px] px-4 pb-5 pt-3">
        <canvas #chartCanvas class="w-full h-full"></canvas>
      </div>
    </div>

    <!-- Activity -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="px-5 py-4 border-b border-gray-100">
        <h2 class="font-semibold text-[1.15rem] text-gray-800">Recent Activity</h2>
        <p class="text-xs text-gray-400 mt-1">Latest system transactions</p>
      </div>

      <div class="p-5 space-y-4 text-sm">
        <div
          *ngFor="let i of [1, 2, 3]"
          class="flex items-center gap-3 p-3 rounded-xl bg-gray-50 hover:bg-gray-100 transition"
        >
          <div
            class="w-10 h-10 rounded-xl bg-red-100 text-red-600 flex items-center justify-center"
          >
            <i class="fa fa-arrow-up"></i>
          </div>

          <div class="min-w-0 flex-1">
            <div class="font-medium text-gray-800 truncate">Withdrawal completed</div>
            <div class="text-gray-400 text-xs mt-0.5">$500 USDT</div>
          </div>

          <span class="text-[11px] text-gray-400">Just now</span>
        </div>
      </div>
    </div>
  </div>
</div>
