<div
  class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/40 px-4"
  (click)="onBackdropClick()"
>
  <div
    class="w-full max-w-2xl overflow-hidden rounded-2xl bg-white shadow-2xl"
    (click)="$event.stopPropagation()"
  >
    <!-- HEADER -->
    <div class="flex items-center justify-between border-b border-gray-100 px-6 py-4">
      <div>
        <h2 class="text-lg font-bold text-gray-800">{{ titleText }}</h2>
        <p class="mt-1 text-sm text-gray-400">{{ descriptionText }}</p>
      </div>

      <button
        type="button"
        class="flex h-9 w-9 items-center justify-center rounded-full text-gray-400 transition hover:bg-gray-100 hover:text-gray-700"
        (click)="close.emit()"
        [disabled]="submitting()"
      >
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
    </div>

    <!-- BODY -->
    <form [formGroup]="form" (ngSubmit)="submit()" class="px-6 py-5">
      <!-- TITLE -->
      <div class="mb-5">
        <label class="mb-2 block text-sm font-semibold text-gray-700">
          Title <span class="text-red-500">*</span>
        </label>

        <input
          type="text"
          formControlName="title"
          placeholder="Enter announcement title"
          class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none transition placeholder:text-gray-400 focus:border-blue-400 focus:ring-4 focus:ring-blue-50"
        />

        <div
          *ngIf="form.get('title')?.touched && form.get('title')?.invalid"
          class="mt-1 text-xs text-red-500"
        >
          <span *ngIf="form.get('title')?.errors?.['required']"> Title is required. </span>
          <span *ngIf="form.get('title')?.errors?.['maxlength']">
            Title must not exceed 255 characters.
          </span>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="mb-5">
        <label class="mb-2 block text-sm font-semibold text-gray-700">
          Content <span class="text-red-500">*</span>
        </label>

        <textarea
          rows="6"
          formControlName="content"
          placeholder="Enter announcement content"
          class="w-full resize-none rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none transition placeholder:text-gray-400 focus:border-blue-400 focus:ring-4 focus:ring-blue-50"
        ></textarea>

        <div class="mt-1 flex items-center justify-between">
          <div
            *ngIf="form.get('content')?.touched && form.get('content')?.invalid"
            class="text-xs text-red-500"
          >
            <span *ngIf="form.get('content')?.errors?.['required']"> Content is required. </span>
            <span *ngIf="form.get('content')?.errors?.['maxlength']">
              Content must not exceed 5000 characters.
            </span>
          </div>

          <span class="ml-auto text-xs text-gray-400">
            {{ form.get('content')?.value?.length || 0 }}/5000
          </span>
        </div>
      </div>

      <!-- LINK URL -->
      <div class="mb-6">
        <label class="mb-2 block text-sm font-semibold text-gray-700">
          Link URL
          <span class="text-xs font-normal text-gray-400">(optional)</span>
        </label>

        <div class="relative">
          <i
            class="fa-solid fa-link absolute left-4 top-1/2 -translate-y-1/2 text-sm text-gray-400"
          ></i>

          <input
            type="text"
            formControlName="link_url"
            placeholder="https://example.com"
            class="w-full rounded-xl border border-gray-200 py-3 pl-10 pr-4 text-sm outline-none transition placeholder:text-gray-400 focus:border-blue-400 focus:ring-4 focus:ring-blue-50"
          />
        </div>

        <div
          *ngIf="form.get('link_url')?.touched && form.get('link_url')?.invalid"
          class="mt-1 text-xs text-red-500"
        >
          Link must not exceed 500 characters.
        </div>
      </div>

      <!-- FOOTER -->
      <div class="flex items-center justify-end gap-3 border-t border-gray-100 pt-5">
        <button
          type="button"
          class="rounded-xl border border-gray-200 px-5 py-2.5 text-sm font-semibold text-gray-600 transition hover:bg-gray-50"
          (click)="close.emit()"
          [disabled]="submitting()"
        >
          Cancel
        </button>

        <button
          type="submit"
          class="inline-flex items-center gap-2 rounded-xl bg-red-500 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-red-700 disabled:cursor-not-allowed disabled:opacity-60"
          [disabled]="submitting()"
        >
          <i *ngIf="submitting()" class="fa-solid fa-spinner animate-spin text-sm"></i>

          <i
            *ngIf="!submitting()"
            class="fa-solid text-sm"
            [ngClass]="isUpdateMode ? 'fa-pen-to-square' : 'fa-bullhorn'"
          ></i>

          {{ buttonText }}
        </button>
      </div>
    </form>
  </div>
</div>
