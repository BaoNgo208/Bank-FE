<div *ngIf="visible" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="w-[420px] bg-white rounded-2xl shadow-xl p-6">
    <!-- HEADER -->
    <div class="flex justify-between items-center mb-5">
      <h2 class="text-lg font-semibold text-gray-800">
        {{ mode === 'create' ? 'Create Rule' : 'Update Rule' }}
      </h2>
      <button (click)="close.emit()" class="text-gray-400 hover:text-red-500">✕</button>
    </div>

    <!-- FORM -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <!-- MIN SPENT -->
      <div>
        <label class="text-sm text-gray-600">Min Spent</label>
        <input
          type="number"
          formControlName="min_spent"
          class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
        />
      </div>

      <!-- ERROR -->
      <p *ngIf="isInvalid('min_spent')" class="text-red-500 text-xs mt-1">
        <span *ngIf="form.get('min_spent')?.errors?.['required']"> Min spent is required </span>

        <span *ngIf="form.get('min_spent')?.errors?.['min']">
          Min spent must be greater than or equal to 0
        </span>
      </p>

      <!-- MAX SPENT -->
      <div>
        <label class="text-sm text-gray-600">Max Spent</label>
        <input
          type="number"
          formControlName="max_spent"
          class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
        />
      </div>
      <!-- ERROR -->
      <p *ngIf="isInvalid('max_spent')" class="text-red-500 text-xs mt-1">
        <span *ngIf="form.get('max_spent')?.errors?.['required']"> Max spent is required </span>

        <span *ngIf="form.get('max_spent')?.errors?.['min']">
          Max spent must be greater than or equal to 1
        </span>
      </p>

      <!-- CASHBACK -->
      <div>
        <label class="text-sm text-gray-600">Cashback (%)</label>
        <input
          type="number"
          step="0.01"
          formControlName="cashback_percent"
          class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500"
        />
      </div>

      <!-- ERROR -->
      <p *ngIf="isInvalid('cashback_percent')" class="text-red-500 text-xs mt-1">
        <span *ngIf="form.get('cashback_percent')?.errors?.['required']">
          Cashback percentage is required
        </span>

        <span *ngIf="form.get('cashback_percent')?.errors?.['min']">
          percentage must be greater than or equal to 0,1
        </span>
      </p>

      <!-- ACTION -->
      <div class="flex justify-end gap-3 pt-3">
        <button
          type="button"
          (click)="close.emit()"
          class="px-4 py-2 border rounded-lg text-gray-600"
        >
          Cancel
        </button>

        <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
          {{ mode === 'create' ? 'Create' : 'Update' }}
        </button>
      </div>
    </form>
  </div>
</div>
