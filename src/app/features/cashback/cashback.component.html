<div class="h-full px-3 py-2 flex flex-col gap-y-5 overflow-auto">
  <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200 w-full">
    <!-- HEADER -->
    <div class="grid grid-cols-3 items-center mb-6">
      <div>
        <button
          (click)="cashbackStore.showCashbackModal.set(true)"
          class="text-sm text-red-600 hover:underline transition"
        >
          View details
        </button>
      </div>

      <h2 class="text-lg font-semibold text-gray-800 text-center">Cashback</h2>

      <div class="text-right">
        <span class="text-sm text-red-600 font-medium"> {{ currentPercent() }}% </span>
      </div>
    </div>

    <!-- MAIN INFO -->
    <div class="grid grid-cols-2 gap-4 mb-8">
      <div>
        <p class="text-xs text-gray-400">Available Cashback</p>
        <p class="text-xl font-semibold text-red-600">
          {{ cashbackDashboard()?.cashback_amount ?? 0 }}
        </p>
      </div>

      <div class="text-right">
        <p class="text-xs text-gray-400">Total Spent</p>
        <p class="text-xl font-semibold text-red-600">
          {{ totalSpent() }}
        </p>
      </div>
    </div>

    <!-- PROGRESS + TIERS -->
    <div class="relative pt-2 pb-16">
      <!-- BAR -->
      <div class="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
        <div
          class="bg-red-500 h-2 rounded-full transition-all duration-500"
          [style.width.%]="overallProgress()"
        ></div>
      </div>

      <!-- DOTS -->
      <ng-container *ngFor="let tier of tiers(); let i = index">
        <div
          class="absolute top-0 flex flex-col items-center -translate-x-1/2"
          [style.left.%]="tierPosition(i)"
        >
          <div
            class="w-4 h-4 rounded-full border-2 bg-white transition-all duration-300"
            [class.bg-red-500]="isTierReached(tier) || isCurrentTier(tier)"
            [class.border-red-500]="isTierReached(tier) || isCurrentTier(tier)"
            [class.border-gray-300]="!isTierReached(tier) && !isCurrentTier(tier)"
            [class.scale-125]="isCurrentTier(tier)"
          ></div>

          <p
            class="text-xs mt-3"
            [class.text-red-600]="isCurrentTier(tier)"
            [class.font-semibold]="isCurrentTier(tier)"
            [class.text-gray-500]="!isCurrentTier(tier)"
          >
            {{ tier.percent }}%
          </p>

          <p class="text-[10px] text-gray-400 whitespace-nowrap">
            {{ tier.min_spent }} - {{ tier.max_spent }}
          </p>
        </div>
      </ng-container>
    </div>

    <!-- NEXT TIER -->
    <div *ngIf="nextTier() as next" class="mt-2 text-xs text-gray-500">
      Spend
      <span class="font-medium text-red-600">
        {{ next.min_spent - totalSpent() }}
      </span>
      more to reach
      <span class="font-medium">{{ next.percent }}%</span>
    </div>
  </div>

  <app-cashback-history-table></app-cashback-history-table>
</div>

<app-cashback-modal *ngIf="cashbackStore.showCashbackModal()"></app-cashback-modal>
