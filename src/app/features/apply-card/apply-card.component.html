<div class="h-full p-6 text-[0.85rem] overflow-auto">
  <!-- PRECAUTIONS -->
  <div class="bg-red-50 border border-red-200 rounded p-4 mb-6">
    <div class="flex items-center gap-2 text-red-600 font-medium mb-2">
      <span>⚠</span>
      <span>Precautions</span>
    </div>
    <p class="text-red-600 text-sm">
      1. It is forbidden to create content that violates national laws and regulations.
    </p>
  </div>

  <!-- FORM CONTAINER -->
  <div class="max-w-3xl space-y-6">
    <!-- Number segment -->
    <div class="grid grid-cols-3 gap-6 items-center">
      <label class="text-gray-700">Number segment:</label>
      <div class="col-span-2 flex gap-3">
        <button class="px-4 py-1 border border-red-600 text-red-600 bg-red-50 rounded">
          436797
        </button>
        <button class="px-4 py-1 border border-gray-300 rounded hover:border-red-500">
          493875
        </button>
      </div>
    </div>

    <!-- Card grouping -->
    <div class="grid grid-cols-3 gap-6 items-center">
      <label class="text-gray-700">
        Card grouping:
        <span class="text-red-500">*</span>
      </label>
      <select
        class="col-span-2 border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-1 focus:ring-red-500"
      >
        <option>Ads agency</option>
        <option>Personal</option>
      </select>
    </div>

    <!-- Number of cards opened -->
    <div class="grid grid-cols-3 gap-6 items-center">
      <label class="text-gray-700">
        Number of cards opened:
        <span class="text-red-500">*</span>
      </label>
      <input
        type="number"
        placeholder="Enter quantity"
        class="col-span-2 border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-1 focus:ring-red-500"
      />
    </div>

    <!-- Recharge amount -->
    <div class="grid grid-cols-3 gap-6 items-center">
      <label class="text-gray-700">
        Recharge amount:
        <span class="text-red-500">*</span>
      </label>
      <input
        type="text"
        value="100.00"
        class="col-span-2 border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-1 focus:ring-red-500"
      />
    </div>

    <!-- Total amount -->
    <div class="grid grid-cols-3 gap-6 items-center">
      <label class="text-gray-700">
        Total amount:
        <span class="text-red-500">*</span>
      </label>
      <input
        type="text"
        value="100.00"
        readonly
        class="col-span-2 border border-gray-300 rounded px-3 py-2 bg-gray-100"
      />
    </div>

    <!-- Total service fee -->
    <div class="grid grid-cols-3 gap-6 items-center">
      <label class="text-gray-700">
        Total service fee:
        <span class="text-red-500">*</span>
      </label>
      <input
        type="text"
        value="0.00"
        readonly
        class="col-span-2 border border-gray-300 rounded px-3 py-2 bg-gray-100"
      />
    </div>

    <!-- Amount to be paid -->
    <div class="grid grid-cols-3 gap-6 items-center">
      <label class="text-gray-700">
        Amount to be paid:
        <span class="text-red-500">*</span>
      </label>
      <input
        type="text"
        value="100.00"
        readonly
        class="col-span-2 border border-gray-300 rounded px-3 py-2 bg-gray-100"
      />
    </div>

    <!-- SUBMIT -->
    <div class="pl-[33%]">
      <button class="px-6 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition">
        Save and Submit
      </button>
    </div>
  </div>
</div>
