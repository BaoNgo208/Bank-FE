<div class="relative inline-flex items-center">
  <select
    class="h-9 w-[115px] appearance-none rounded-full border border-red-300/60 bg-rose-400 px-3 pr-8 text-sm font-bold text-white shadow-sm outline-none transition hover:bg-rose-500 hover:border-red-400 focus:bg-rose-500 focus:border-red-500 focus:ring-4 focus:ring-red-100"
    [ngModel]="languageService.currentLang()"
    (ngModelChange)="changeLanguage($event)"
    aria-label="Select language"
  >
    <option
      *ngFor="let lang of languageService.languages"
      [ngValue]="lang.code"
      class="bg-white text-gray-800"
    >
      {{ lang.flag }} {{ lang.nativeLabel }}
    </option>
  </select>

  <svg
    class="pointer-events-none absolute right-3 h-4 w-4 text-white"
    viewBox="0 0 20 20"
    fill="currentColor"
    aria-hidden="true"
  >
    <path
      fill-rule="evenodd"
      d="M5.23 7.21a.75.75 0 011.06.02L10 11.17l3.71-3.94a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
      clip-rule="evenodd"
    />
  </svg>
</div>
