<div
  *ngIf="show"
  class="fixed inset-0 flex items-center justify-center bg-black/40"
  [class]="zIndex"
>
  <div class="w-[320px] rounded-2xl bg-white p-6 shadow-xl flex flex-col items-center gap-4">
    <div
      class="h-10 w-10 rounded-full border-4 border-gray-200 border-t-red-500 animate-spin"
    ></div>

    <div class="text-center">
      <p class="text-sm font-semibold text-gray-800">
        {{ title }}
      </p>

      <p class="text-xs text-gray-500 mt-1">
        {{ message }}
      </p>
    </div>
  </div>
</div>
