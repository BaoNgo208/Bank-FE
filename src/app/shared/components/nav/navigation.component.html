<div class="h-full flex items-center justify-between px-4 gap-3">
  <!-- LEFT -->
  <div class="flex items-center gap-3 min-w-0">
    <!-- HAMBURGER -->
    <button
      class="small_laptop:hidden w-9 h-9 rounded-lg flex items-center justify-center text-gray-600 hover:bg-gray-100 transition shrink-0"
      (click)="toggleSidebar.emit()"
    >
      <i class="fa-solid fa-bars"></i>
    </button>
  </div>

  <!-- RIGHT -->
  <div class="flex items-center gap-3 shrink-0">
    <!-- PROFILE LOADING -->
    <div *ngIf="loadingProfile()" class="flex items-center gap-2 animate-pulse">
      <div class="w-9 h-9 rounded-full bg-gray-200"></div>
      <div class="hidden sm:block w-24 h-3 rounded bg-gray-200"></div>
    </div>

    <!-- PROFILE DROPDOWN -->
    <div
      *ngIf="!loadingProfile() && profile() as user"
      class="relative"
      (click)="$event.stopPropagation()"
    >
      <!-- TRIGGER -->
      <button
        type="button"
        class="h-10 pl-1.5 pr-2 rounded-xl border border-gray-200 bg-white hover:bg-gray-50 hover:border-red-100 transition flex items-center gap-2"
        (click)="toggleProfileDropdown($event)"
      >
        <!-- AVATAR -->
        <div
          class="w-8 h-8 rounded-full bg-red-50 border border-red-100 text-red-500 flex items-center justify-center font-semibold text-sm shrink-0"
        >
          {{ getAvatarText() }}
        </div>

        <!-- USERNAME -->
        <span class="hidden sm:inline max-w-[120px] truncate text-sm font-medium text-gray-700">
          {{ user.username }}
        </span>

        <!-- CHEVRON -->
        <i
          class="fa-solid fa-chevron-down text-[11px] text-gray-400 transition"
          [ngClass]="{
            'rotate-180': profileDropdownOpen(),
          }"
        ></i>
      </button>

      <!-- DROPDOWN MENU -->
      <div
        *ngIf="profileDropdownOpen()"
        class="absolute right-0 top-12 w-80 rounded-2xl border border-gray-200 bg-white shadow-xl shadow-gray-200/70 overflow-hidden z-50"
      >
        <!-- HEADER -->
        <div class="p-4 bg-gradient-to-br from-red-50 to-white border-b border-gray-100">
          <div class="flex items-center gap-3">
            <div
              class="w-12 h-12 rounded-full bg-red-100 text-red-600 flex items-center justify-center font-bold text-lg border border-red-200 shrink-0"
            >
              {{ getAvatarText() }}
            </div>

            <div class="min-w-0">
              <p class="text-sm font-semibold text-gray-900 truncate">
                {{ user.username }}
              </p>
              <p class="text-xs text-gray-500 truncate">
                {{ user.email }}
              </p>
            </div>
          </div>
        </div>

        <!-- BODY -->
        <div class="p-3 space-y-2">
          <!-- CARD LIMIT -->
          <div class="flex items-center justify-between rounded-xl bg-gray-50 px-3 py-3">
            <div class="flex items-center gap-3">
              <div
                class="w-9 h-9 rounded-lg bg-red-50 text-red-500 flex items-center justify-center"
              >
                <i class="fa-regular fa-credit-card text-sm"></i>
              </div>

              <div>
                <p class="text-xs text-gray-500">Card open limit</p>
                <p class="text-sm font-semibold text-gray-800">
                  {{ user.card_open_limit }}
                </p>
              </div>
            </div>
          </div>

          <!-- CREATED AT -->
          <div class="flex items-center justify-between rounded-xl bg-gray-50 px-3 py-3">
            <div class="flex items-center gap-3">
              <div
                class="w-9 h-9 rounded-lg bg-red-50 text-red-500 flex items-center justify-center"
              >
                <i class="fa-regular fa-calendar text-sm"></i>
              </div>

              <div>
                <p class="text-xs text-gray-500">Joined date</p>
                <p class="text-sm font-semibold text-gray-800">
                  {{ formatCreatedAt(user.created_at) }}
                </p>
              </div>
            </div>
          </div>

          <!-- CHANGE PASSWORD -->
          <button
            type="button"
            class="w-full flex items-center justify-between rounded-xl bg-gray-50 hover:bg-red-50 px-3 py-3 transition group"
            (click)="openChangePassword()"
          >
            <div class="flex items-center gap-3">
              <div
                class="w-9 h-9 rounded-lg bg-red-50 text-red-500 flex items-center justify-center group-hover:bg-red-100"
              >
                <i class="fa-solid fa-lock text-sm"></i>
              </div>

              <div class="text-left">
                <p class="text-sm font-semibold text-gray-800">Change password</p>
                <p class="text-xs text-gray-500">Update your account password</p>
              </div>
            </div>

            <i class="fa-solid fa-chevron-right text-xs text-gray-400"></i>
          </button>
        </div>

        <!-- FOOTER -->
        <div class="p-3 border-t border-gray-100 bg-white">
          <button
            type="button"
            class="w-full h-10 rounded-xl bg-red-50 text-red-500 hover:bg-red-100 hover:text-red-600 transition flex items-center justify-center gap-2 text-sm font-semibold"
            (click)="logout()"
          >
            <i class="fa-solid fa-arrow-right-from-bracket text-sm"></i>
            Logout
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<app-change-password-modal
  *ngIf="showChangePasswordModal()"
  loginPath="/auth/login"
  [changePassword]="handleUserChangePassword"
  (close)="closeChangePassword()"
></app-change-password-modal>
