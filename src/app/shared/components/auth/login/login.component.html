<div class="flex flex-col gap-y-12">
  <!-- Title -->
  <div class="flex flex-col items-center gap-2">
    <h2 class="font-semibold text-xl text-gray-800">User Login</h2>
    <div class="w-10 h-[3px] bg-red-500 rounded-full"></div>
  </div>

  <!-- Form -->
  <div>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
      <!-- Username -->
      <div class="relative group">
        <span
          class="absolute left-3 top-1/2 -translate-y-1/2 opacity-60 group-focus-within:opacity-100 transition"
        >
          <img src="/user.png" class="w-4" />
        </span>

        <input
          type="text"
          formControlName="username"
          placeholder="Username"
          class="w-full border border-gray-200 pl-10 py-3 text-sm rounded-md focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent hover:border-red-300 transition-all duration-200"
        />
      </div>

      <!-- Password -->
      <div class="relative group">
        <span
          class="absolute left-3 top-1/2 -translate-y-1/2 opacity-60 group-focus-within:opacity-100 transition"
        >
          <img src="/password.png" class="w-4" />
        </span>

        <input
          type="password"
          formControlName="password"
          placeholder="Password"
          class="w-full border border-gray-200 pl-10 py-3 text-sm rounded-md focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent hover:border-red-300 transition-all duration-200"
        />
      </div>

      <!-- Forgot password -->
      <div class="flex justify-end">
        <span
          (click)="redirectToForgotPassword()"
          class="text-[0.75rem] text-red-500 hover:underline cursor-pointer transition"
        >
          Forgot password?
        </span>
      </div>

      <!-- Buttons -->
      <div class="flex gap-4 mt-4">
        <!-- Login -->
        <button
          type="submit"
          class="flex-1 bg-red-500 text-white py-3 rounded-md text-sm font-medium hover:bg-red-600 active:scale-[0.98] transition-all duration-200 shadow-md hover:shadow-lg"
        >
          Log in
        </button>

        <!-- Register -->
        <button
          type="button"
          class="flex-1 border border-red-500 text-red-500 py-3 rounded-md text-sm font-medium hover:bg-red-50 active:scale-[0.98] transition-all duration-200"
          (click)="redirectToRegister()"
        >
          Register
        </button>
      </div>
    </form>
  </div>
</div>
